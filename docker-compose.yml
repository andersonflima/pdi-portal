services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: file:/app/apps/api/data/pdi.db
      JWT_SECRET: change-this-secret-before-production
      PORT: 3333
      WEB_ORIGIN: http://localhost:5173
    volumes:
      - api-data:/app/apps/api/data
    ports:
      - "3333:3333"
    command: sh -c "npm run db:push && npm run db:seed && node dist/server.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "5173:8080"

volumes:
  api-data:
