services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      DATABASE_URL: file:/app/app/api/data/pdi.db
      JWT_SECRET: change-this-secret-before-production
      PORT: 3333
      WEB_ORIGIN: http://localhost:3333
    volumes:
      - api-data:/app/app/api/data
    ports:
      - "3333:3333"
    command: sh -c "npm run db:push && npm run db:seed && node dist/server.js"

volumes:
  api-data:
