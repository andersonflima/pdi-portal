services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pdi
      POSTGRES_PASSWORD: pdi
      POSTGRES_USER: pdi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdi -d pdi"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pdi:pdi@postgres:5432/pdi
      JWT_SECRET: change-this-secret-before-production
      PORT: 3333
      WEB_ORIGIN: http://localhost:5173
    ports:
      - "3333:3333"
    command: sh -c "pnpm db:push && pnpm db:seed && node dist/server.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "5173:8080"

volumes:
  postgres-data:
