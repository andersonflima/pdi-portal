@if (isOpen()) {
  <div class="command-palette-backdrop" (click)="close()">
    <section
      #dialog
      class="command-palette"
      role="dialog"
      aria-modal="true"
      aria-labelledby="command-palette-title"
      (click)="$event.stopPropagation()"
      (keydown)="handleKeydown($event)"
    >
      <header>
        <h2 id="command-palette-title">Command Palette</h2>
        <p>Use quick actions to navigate faster.</p>
      </header>

      <input
        #searchInput
        class="command-search"
        type="text"
        aria-label="Search commands"
        placeholder="Search commands…"
        autocomplete="off"
        [value]="query()"
        (input)="onSearch($event)"
      />

      <div class="command-list" aria-label="Commands">
        @for (command of filteredCommands(); track command.id; let i = $index) {
          <button
            type="button"
            [class.is-active]="i === activeIndex()"
            (click)="runCommand(command.id)"
            (mouseenter)="setActive(i)"
          >
            <strong>{{ command.label }}</strong>
            <small>{{ command.description }}</small>
          </button>
        } @empty {
          <p class="command-empty" role="status">No commands match “{{ query() }}”.</p>
        }
      </div>

      <footer>
        <span><kbd>↑</kbd> <kbd>↓</kbd> navigate</span>
        <span><kbd>Enter</kbd> run</span>
        <span><kbd>Esc</kbd> close</span>
      </footer>
    </section>
  </div>
}
