<section class="manage-page">
  <header>
    <h2>PDI Management</h2>
    <p>{{ plans.length }} plans available</p>
  </header>

  <div class="page-grid">
    <article class="card">
      <h3>All plans</h3>
      <div class="plan-list">
        @for (item of plans; track item.id) {
          <div [class.is-active]="item.id === editingPlanId">
            <button type="button" (click)="selectPlanForEdit(item.id)">
              <strong>{{ item.title }}</strong>
              <small>{{ ownerName(item.ownerId) }} - {{ item.status }}</small>
            </button>
            <button class="danger" type="button" [disabled]="isDeletingPlan" (click)="handleDeletePlan(item.id, item.title)">Remove</button>
          </div>
        }
      </div>
    </article>

    <article class="card">
      <h3>Create PDI</h3>
      <form (submit)="handleCreatePlan($event)">
        <select required [(ngModel)]="newPlan.ownerId" name="new-ownerId">
          <option value="">Select owner</option>
          @for (user of users; track user.id) {
            <option [value]="user.id">{{ user.name }}</option>
          }
        </select>
        <input placeholder="PDI title" required [(ngModel)]="newPlan.title" name="new-title" />
        <textarea placeholder="Development objective" required [(ngModel)]="newPlan.objective" name="new-objective"></textarea>
        <button [disabled]="isCreatingPlan" type="submit">{{ isCreatingPlan ? 'Creating PDI' : 'Create PDI' }}</button>
      </form>
    </article>

    @if (editPlan; as form) {
      <article class="card">
        <h3>Edit PDI</h3>
        <form (submit)="handleUpdatePlan($event)">
          <select required [(ngModel)]="form.ownerId" name="edit-ownerId">
            @for (user of users; track user.id) {
              <option [value]="user.id">{{ user.name }}</option>
            }
          </select>
          <select [(ngModel)]="form.status" name="edit-status">
            <option value="DRAFT">Draft</option>
            <option value="ACTIVE">Active</option>
            <option value="DONE">Done</option>
          </select>
          <input placeholder="PDI title" required [(ngModel)]="form.title" name="edit-title" />
          <textarea placeholder="Development objective" required [(ngModel)]="form.objective" name="edit-objective"></textarea>
          <button [disabled]="isUpdatingPlan" type="submit">{{ isUpdatingPlan ? 'Saving PDI' : 'Save changes' }}</button>
        </form>
      </article>
    }
  </div>
</section>
