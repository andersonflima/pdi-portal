<main class="workspace">
  <section class="work-surface">
    @if (workspace.activePlan(); as activePlan) {
      <app-canvas-board
        [isCreatingPlan]="workspace.isCreatingPlan()"
        [isCreatingUser]="workspace.isCreatingUser()"
        [isDeletingPlan]="workspace.isDeletingPlan()"
        [isExportingPlan]="workspace.isExportingPlan()"
        [isImportingPlan]="workspace.isImportingPlan()"
        [isUpdatingPlan]="workspace.isUpdatingPlan()"
        [plan]="activePlan"
        [plans]="workspace.plans()"
        [user]="user"
        [users]="workspace.users()"
        [usersCount]="workspace.users().length"
        (createPlan)="handleCreatePlan($event)"
        (createUser)="handleCreateUser($event)"
        (deletePlan)="handleDeletePlan($event)"
        (exportPlan)="handleExportPlan($event)"
        (importPlan)="handleImportPlan($event)"
        (logout)="handleLogout()"
        (selectPlan)="workspace.selectPlan($event)"
        (updatePlan)="handleUpdatePlan($event)"
      />
    } @else {
      <div class="empty-state">Create a PDI plan to start.</div>
    }
  </section>
</main>
