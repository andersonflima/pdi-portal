<div class="canvas-shell">
  <app-canvas-header
    [isCreatingPlan]="isCreatingPlan"
    [isCreatingUser]="isCreatingUser"
    [isDeletingPlan]="isDeletingPlan"
    [isExportingPlan]="isExportingPlan"
    [isImportingPlan]="isImportingPlan"
    [isSaving]="isSaving()"
    [isUpdatingPlan]="isUpdatingPlan"
    [plan]="plan"
    [plans]="plans"
    [user]="user"
    [users]="users"
    [usersCount]="usersCount"
    (createPlan)="createPlan.emit($event)"
    (createUser)="createUser.emit($event)"
    (deletePlan)="deletePlan.emit($event)"
    (exportBoardAsPng)="exportBoardToPng()"
    (exportBoardAsSvg)="exportBoardToSvg()"
    (exportPlan)="exportPlan.emit($event)"
    (importPlan)="importPlan.emit($event)"
    (logout)="logout.emit()"
    (saveBoard)="saveCurrentBoard()"
    (selectPlan)="selectPlan.emit($event)"
    (updatePlan)="updatePlan.emit($event)"
  />

  <app-canvas-toolbar
    [connectorSourceId]="connectorSourceId()"
    [selectedEdge]="selectedEdge()"
    [selectedEdgeDirection]="selectedEdgeDirection()"
    [selectedNode]="selectedNode()"
    (createNode)="handleCreateNode($event)"
    (edgeChange)="updateSelectedEdge($event)"
    (nodeStyleChange)="updateSelectedNodeStyle($event)"
    (textStyleChange)="updateSelectedTextStyle($event)"
    (toggleConnectorMode)="handleToggleConnectorMode()"
  />

  <div
    #canvasStage
    class="canvas-stage"
    [class.is-panning]="isPanning()"
    [class.is-selecting]="marqueeSelection() !== null"
    (scroll)="handleStageScroll()"
  >
    <div class="canvas-zoom-controls" aria-label="Canvas zoom controls">
      <button type="button" aria-label="Zoom out" title="Zoom out" (click)="zoomOut()">
        <i-lucide name="zoom-out" [size]="16" />
      </button>
      <span>{{ zoomPercent() }}%</span>
      <button type="button" aria-label="Zoom in" title="Zoom in" (click)="zoomIn()">
        <i-lucide name="zoom-in" [size]="16" />
      </button>
      <button type="button" aria-label="Reset zoom" title="Reset zoom" (click)="resetZoom()">
        <i-lucide name="rotate-ccw" [size]="16" />
      </button>
    </div>

    <div class="canvas-viewport" [style.height.px]="canvasSize.height * zoom()" [style.width.px]="canvasSize.width * zoom()">
      <div
        #canvasPlane
        class="canvas-plane"
        [style.height.px]="canvasSize.height"
        [style.transform]="'scale(' + zoom() + ')'"
        [style.width.px]="canvasSize.width"
        (pointerdown)="handlePlanePointerDown($event)"
      >
        <app-canvas-edge-layer
          [edges]="edges()"
          [nodes]="nodes()"
          [selectedEdgeId]="selectedEdgeId()"
          (selectEdge)="handleSelectEdge($event)"
        />

        @if (activeConnector(); as activeConnector) {
          <svg
            class="edge-layer edge-layer-preview"
            [attr.viewBox]="'0 0 ' + canvasSize.width + ' ' + canvasSize.height"
            [attr.width]="canvasSize.width"
            [attr.height]="canvasSize.height"
            preserveAspectRatio="none"
          >
            <path class="edge-line edge-line-preview" [attr.d]="connectorPreviewPath(activeConnector)" />
          </svg>
        }

        @for (node of renderedNodes(); track node.id) {
          <app-canvas-node
            [node]="node"
            [selected]="isNodeSelected(node.id)"
            [style.height.px]="node.height"
            [style.left.px]="node.position.x"
            [style.top.px]="node.position.y"
            [style.width.px]="node.width"
            [style.z-index]="nodeStackLevel(node)"
            (connectorStart)="startConnectorDrag($event, node)"
            (dataChange)="updateNodeData(node.id, $event)"
            (editSessionEnd)="handleNodeEditSessionEnd()"
            (editSessionStart)="handleNodeEditSessionStart()"
            (pointerdown)="handleNodePointerDown($event, node)"
            (resizeStart)="startNodeResize($event, node)"
          />
        }

        <svg
          class="edge-label-overlay"
          [attr.viewBox]="'0 0 ' + canvasSize.width + ' ' + canvasSize.height"
          [attr.width]="canvasSize.width"
          [attr.height]="canvasSize.height"
          preserveAspectRatio="none"
        >
          @for (edge of edges(); track edge.id) {
            @if (edge.label && shouldRenderEdgeLabel(edge)) {
              <text
                class="edge-label-overlay-text"
                [attr.x]="edgeLabelPosition(edge).x"
                [attr.y]="edgeLabelPosition(edge).y - 10"
                [attr.fill]="edge.style.color"
              >
                {{ edge.label }}
              </text>
            }
          }
        </svg>

        @if (marqueeBoxStyle(); as marqueeBoxStyle) {
          <div class="selection-marquee" [style.height]="marqueeBoxStyle.height" [style.left]="marqueeBoxStyle.left" [style.top]="marqueeBoxStyle.top" [style.width]="marqueeBoxStyle.width"></div>
        }
      </div>
    </div>

    <aside class="canvas-minimap" aria-label="Canvas map">
      <button
        type="button"
        class="canvas-minimap-surface"
        [style.height.px]="minimapSize.height"
        [style.width.px]="minimapSize.width"
        (pointerdown)="handleMinimapPointerDown($event)"
      >
        @for (node of minimapNodes(); track node.id) {
          <span
            class="canvas-minimap-node"
            [class.is-selected]="node.isSelected"
            [style.height.px]="node.height"
            [style.left.px]="node.x"
            [style.top.px]="node.y"
            [style.width.px]="node.width"
          ></span>
        }

        @if (minimapViewport(); as minimapViewport) {
          <span
            class="canvas-minimap-viewport"
            [style.height.px]="minimapViewport.height"
            [style.left.px]="minimapViewport.x"
            [style.top.px]="minimapViewport.y"
            [style.width.px]="minimapViewport.width"
          ></span>
        }
      </button>
    </aside>
  </div>
</div>
