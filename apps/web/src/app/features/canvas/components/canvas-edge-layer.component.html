<svg class="edge-layer" [attr.viewBox]="'0 0 ' + canvasSize.width + ' ' + canvasSize.height">
  <defs>
    @for (color of markerColors(); track color) {
      @for (angle of markerAngles; track angle) {
        <marker
          [attr.id]="markerIdForColorAndAngle(color, angle)"
          viewBox="0 0 20 14"
          markerWidth="20"
          markerHeight="14"
          refX="0"
          refY="7"
          [attr.orient]="angle"
          markerUnits="userSpaceOnUse"
        >
          <path d="M 18 7 L 0 1 L 0 13 Z" [attr.fill]="color" />
        </marker>
      }
    }
  </defs>

  @for (edge of edges(); track edge.id) {
    @if (shouldRenderEdge(edge) && edgePath(edge); as path) {
      <g [class.is-selected]="selectedEdgeId() === edge.id">
        <path
          class="edge-hit-area"
          [attr.d]="path"
          (pointerdown)="handleSelect($event, edge.id)"
          (dblclick)="handleEdit($event, edge.id)"
        />
        @if (isBidirectional(edge)) {
          <defs>
            <mask
              [attr.id]="edgeLiveMaskId(edge.id, 'start')"
              maskUnits="userSpaceOnUse"
              [attr.x]="0"
              [attr.y]="0"
              [attr.width]="canvasSize.width"
              [attr.height]="canvasSize.height"
            >
              <rect [attr.x]="0" [attr.y]="0" [attr.width]="canvasSize.width" [attr.height]="canvasSize.height" fill="black" />
              <path
                [attr.d]="path"
                fill="none"
                stroke="white"
                stroke-width="10"
                stroke-linecap="round"
                stroke-linejoin="round"
                pathLength="100"
                stroke-dasharray="50 50"
              />
            </mask>
            <mask
              [attr.id]="edgeLiveMaskId(edge.id, 'end')"
              maskUnits="userSpaceOnUse"
              [attr.x]="0"
              [attr.y]="0"
              [attr.width]="canvasSize.width"
              [attr.height]="canvasSize.height"
            >
              <rect [attr.x]="0" [attr.y]="0" [attr.width]="canvasSize.width" [attr.height]="canvasSize.height" fill="black" />
              <path
                [attr.d]="path"
                fill="none"
                stroke="white"
                stroke-width="10"
                stroke-linecap="round"
                stroke-linejoin="round"
                pathLength="100"
                stroke-dasharray="50 50"
                [attr.stroke-dashoffset]="-50"
              />
            </mask>
          </defs>
          <path
            class="edge-line-live edge-line-live-bidirectional edge-line-live-bidirectional-forward"
            [class.edge-line-live-dashed]="edge.style.lineStyle === 'dashed'"
            [attr.d]="path"
            [attr.stroke]="edge.style.color"
            [attr.mask]="'url(#' + edgeLiveMaskId(edge.id, 'start') + ')'"
          />
          <path
            class="edge-line-live edge-line-live-bidirectional edge-line-live-bidirectional-reverse"
            [class.edge-line-live-dashed]="edge.style.lineStyle === 'dashed'"
            [attr.d]="path"
            [attr.stroke]="edge.style.color"
            [attr.mask]="'url(#' + edgeLiveMaskId(edge.id, 'end') + ')'"
          />
        } @else {
          <path
            class="edge-line-live"
            [class.edge-line-live-dashed]="edge.style.lineStyle === 'dashed'"
            [attr.d]="path"
            [attr.stroke]="edge.style.color"
          />
        }
        <path
          class="edge-line"
          [class.edge-line-dashed]="edge.style.lineStyle === 'dashed'"
          [attr.d]="path"
          [attr.stroke]="edge.style.color"
          [attr.marker-end]="'url(#' + edgeEndMarkerId(edge) + ')'"
          [attr.marker-start]="isBidirectional(edge) ? 'url(#' + edgeStartMarkerId(edge) + ')' : null"
        />
      </g>
    }
  }
</svg>
