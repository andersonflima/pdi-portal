<svg class="edge-layer" [attr.viewBox]="'0 0 ' + canvasSize.width + ' ' + canvasSize.height">
  <defs>
    <marker id="edge-arrow-head" viewBox="0 0 20 14" markerWidth="20" markerHeight="14" refX="0" refY="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M 0 7 L 18 1 L 18 13 Z" fill="context-stroke" />
    </marker>
  </defs>

  @for (edge of edges(); track edge.id) {
    @if (shouldRenderEdge(edge) && edgePath(edge); as path) {
      <g [class.is-selected]="selectedEdgeId() === edge.id">
        <path
          class="edge-hit-area"
          [attr.d]="path"
          (pointerdown)="handleSelect($event, edge.id)"
        />
        <path
          class="edge-line-live"
          [class.edge-line-live-dashed]="edge.style.lineStyle === 'dashed'"
          [attr.d]="path"
          [attr.stroke]="edge.style.color"
        />
        <path
          class="edge-line"
          [class.edge-line-dashed]="edge.style.lineStyle === 'dashed'"
          [attr.d]="path"
          [attr.stroke]="edge.style.color"
          [attr.marker-end]="'url(#edge-arrow-head)'"
          [attr.marker-start]="isBidirectional(edge) ? 'url(#edge-arrow-head)' : null"
        />
      </g>
    }
  }
</svg>
