sonar.projectKey=pdi-portal
sonar.projectName=PDI Portal
sonar.projectVersion=0.1.0

# Source layout (monorepo: api + web + shared contracts)
sonar.sources=apps/api/src,apps/web/src,packages/contracts/src
sonar.tests=apps/api/src,apps/api/test,apps/web/src,packages/contracts/src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
sonar.sourceEncoding=UTF-8

# Exclude build output, dependencies and non-testable assets from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.angular/**,apps/api/public/**,**/*.html,**/*.css,e2e/**

# Exclude generated/declarative files and entrypoints from the coverage denominator
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,apps/api/src/server.ts,apps/api/src/seed.ts,apps/api/src/database-init.ts,apps/web/src/main.ts,apps/web/src/**/*.component.ts,apps/web/src/**/*.models.ts,apps/web/src/**/*.constants.ts,apps/web/src/app/shared/lucide-icons.ts,apps/web/src/environments/**

# LCOV coverage reports produced by `npm run test:coverage` in each package
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/web/lcov.info,packages/contracts/coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.base.json
